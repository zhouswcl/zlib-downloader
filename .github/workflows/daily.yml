name: Daily Z-Library Download

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      keywords:
        description: "搜索关键词 (逗号分隔)"
        required: false
        default: ""
      max_downloads:
        description: "最多下载本数"
        required: false
        default: "3"

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download zlib CLI v0.0.4
        run: |
          curl -fsSL -o /tmp/zlib.tar.gz \
            "https://github.com/heartleo/zlib/releases/download/v0.0.4/zlib_0.0.4_linux_x86_64.tar.gz"
          tar xzf /tmp/zlib.tar.gz -C /tmp
          chmod +x /tmp/zlib
          sudo mv /tmp/zlib /usr/local/bin/zlib
          echo "ZLIB_HOME=/usr/local/bin" >> $GITHUB_ENV

      - name: Verify zlib CLI
        run: zlib version

      - name: Run download script
        env:
          ZLIB_EMAIL: ${{ secrets.ZLIB_EMAIL }}
          ZLIB_PASSWORD: ${{ secrets.ZLIB_PASSWORD }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            ARGS="$ARGS --keywords \"${{ github.event.inputs.keywords }}\""
          fi
          if [ -n "${{ github.event.inputs.max_downloads }}" ]; then
            ARGS="$ARGS --max-downloads ${{ github.event.inputs.max_downloads }}"
          fi
          python -u main.py $ARGS --skip-upload --json

      - name: Upload books as artifact
        uses: actions/upload-artifact@v4
        with:
          name: zlib-books
          path: downloads/
          retention-days: 7
          if-no-files-found: warn
