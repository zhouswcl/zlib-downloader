name: Daily Z-Library Download

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      keywords:
        description: "搜索关键词 (逗号分隔)"
        required: false
        default: ""
      max_downloads:
        description: "最多下载本数"
        required: false
        default: "3"

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache zlib CLI
        id: cache-zlib
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/zlib
          key: zlib-cli-v1

      - name: Install zlib CLI (if not cached)
        if: steps.cache-zlib.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/heartleo/zlib/main/install.sh | sudo sh
          echo "ZLIB_HOME=/usr/local/bin" >> $GITHUB_ENV
          
      - name: Verify zlib CLI
        run: zlib version

      - name: Run download script
        env:
          ZLIB_EMAIL: ${{ secrets.ZLIB_EMAIL }}
          ZLIB_PASSWORD: ${{ secrets.ZLIB_PASSWORD }}
          RELAY_URL: ${{ secrets.RELAY_URL }}
          RELAY_TOKEN: ${{ secrets.RELAY_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            ARGS="$ARGS --keywords \"${{ github.event.inputs.keywords }}\""
          fi
          if [ -n "${{ github.event.inputs.max_downloads }}" ]; then
            ARGS="$ARGS --max-downloads ${{ github.event.inputs.max_downloads }}"
          fi
          python -u main.py $ARGS --json
