name: Daily Z-Library Download

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      keywords:
        description: "搜索关键词 (逗号分隔)"
        required: false
        default: ""
      max_downloads:
        description: "最多下载本数"
        required: false
        default: "3"

jobs:
  download:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install zlib CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/heartleo/zlib/main/install.sh | sudo sh
          echo "ZLIB_HOME=/usr/local/bin" >> $GITHUB_ENV
          zlib version

      - name: Install aliyunpan CLI
        run: |
          wget -q -O /tmp/aliyunpan.zip \
            https://github.com/tickstep/aliyunpan/releases/download/v0.3.7/aliyunpan-v0.3.7-linux-amd64.zip
          unzip -q -o /tmp/aliyunpan.zip -d /tmp/aliyunpan
          sudo cp /tmp/aliyunpan/aliyunpan-v0.3.7-linux-amd64/aliyunpan /usr/local/bin/
          rm -rf /tmp/aliyunpan*
          aliyunpan version

      - name: Run download script
        env:
          ZLIB_EMAIL: ${{ secrets.ZLIB_EMAIL }}
          ZLIB_PASSWORD: ${{ secrets.ZLIB_PASSWORD }}
          ALIYUNDRIVE_REFRESH_TOKEN: ${{ secrets.ALIYUNDRIVE_REFRESH_TOKEN }}
          ALIYUNDRIVE_PARENT_ID: ${{ secrets.ALIYUNDRIVE_PARENT_ID }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            ARGS="$ARGS --keywords \"${{ github.event.inputs.keywords }}\""
          fi
          if [ -n "${{ github.event.inputs.max_downloads }}" ]; then
            ARGS="$ARGS --max-downloads ${{ github.event.inputs.max_downloads }}"
          fi
          python main.py $ARGS --json